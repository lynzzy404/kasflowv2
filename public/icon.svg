<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Minimalist wallet - outer rectangle (simplified wallet body) -->
  <rect x="220" y="340" width="620" height="380" rx="80" fill="none" stroke="#FFFFFF" stroke-width="48"/>

  <!-- Wallet flap / fold line -->
  <rect x="220" y="460" width="620" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>

  <!-- Coin / circle representing money inside -->
  <circle cx="512" cy="560" r="100" fill="#FFFFFF"/>

  <!-- Dollar-less coin: just a minimalist dot for value -->
  <circle cx="512" cy="560" r="36" fill="#007AFF"/>
</svg>
